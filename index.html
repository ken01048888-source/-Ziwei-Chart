<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>紫微斗數排盤 - 原始還原版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #f3f4f6; font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; }
    
    .grid-board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 2px;
      background-color: #9ca3af;
      border: 2px solid #9ca3af;
      aspect-ratio: 1 / 1;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
    }
    
    .palace {
      background-color: #ffffff;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .palace-content {
      width: 100%;
      height: 100%;
      padding: 6px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.2s ease;
    }
    
    .center-palace {
      grid-area: 2 / 2 / 4 / 4;
      background-color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
  </style>
</head>
<body class="p-4 flex flex-col h-screen">
  
  <!-- 頂部控制列 -->
  <div class="flex justify-between items-center mb-4 max-w-[800px] mx-auto w-full">
    <h1 class="text-xl font-bold text-gray-800">紫微斗數</h1>
    <button class="bg-gray-800 text-white px-4 py-2 rounded shadow hover:bg-gray-700">排盤</button>
  </div>

  <!-- 命盤區 -->
  <div id="board" class="grid-board shadow-xl"></div>

  <!-- 底部控制區 -->
  <div class="mt-6 flex justify-center gap-3 max-w-[800px] mx-auto w-full">
    <button class="bg-purple-100 text-purple-800 px-5 py-2 rounded-lg font-bold border border-purple-300 shadow hover:bg-purple-200" onclick="simulateScale()">大限</button>
    <button class="bg-green-100 text-green-800 px-5 py-2 rounded-lg font-bold border border-green-300 shadow hover:bg-green-200" onclick="simulateScale()">流年</button>
    <button class="bg-blue-100 text-blue-800 px-5 py-2 rounded-lg font-bold border border-blue-300 shadow hover:bg-blue-200" onclick="simulateScale()">流月</button>
    <button class="bg-orange-100 text-orange-800 px-5 py-2 rounded-lg font-bold border border-orange-300 shadow hover:bg-orange-200" onclick="simulateScale()">流日</button>
  </div>

  <script>
    const board = document.getElementById('board');
    const gridAreas = [
      '4/1', '3/1', '2/1', '1/1', // 寅, 卯, 辰, 巳
      '1/2', '1/3', '1/4',        // 午, 未, 申
      '2/4', '3/4', '4/4',        // 酉, 戌, 亥
      '4/3', '4/2'                // 子, 丑
    ];

    // 渲染 12 宮位
    for(let i = 0; i < 12; i++) {
      const palace = document.createElement('div');
      palace.className = 'palace';
      palace.style.gridArea = gridAreas[i];
      
      palace.innerHTML = `
        <div class="palace-content">
          <!-- 上排：宮干地支與過客星曜 -->
          <div class="flex justify-between items-start">
            <div class="bg-gray-200 border border-gray-400 px-1 text-xs text-gray-700 font-bold rounded">甲子</div>
            <div class="flex gap-1">
              <div class="text-xs text-red-600 font-bold">祿</div>
              <div class="text-xs text-gray-600 font-bold">羊</div>
            </div>
          </div>

          <!-- 中排：主副星與四化 -->
          <div class="flex flex-col items-center justify-center flex-grow py-1 gap-1">
            <div class="flex items-center gap-1">
              <span class="text-base font-bold text-red-700">紫微</span>
              <span class="text-[10px] bg-blue-600 text-white px-1 py-0.5 rounded">權</span>
            </div>
            <div class="flex items-center gap-1">
              <span class="text-sm font-bold text-gray-700">文昌</span>
              <span class="text-[10px] bg-gray-500 text-white px-1 py-0.5 rounded">忌</span>
            </div>
          </div>

          <!-- 下排：歲數與疊宮本命 -->
          <div class="flex justify-between items-end">
            <div class="text-xs text-gray-500 font-bold">4-13</div>
            <div class="flex flex-col items-end gap-1">
              <span class="text-xs text-purple-700 border border-purple-400 bg-purple-50 px-1 rounded">大限命宮</span>
              <span class="text-xs text-green-700 border border-green-400 bg-green-50 px-1 rounded">流年夫妻</span>
              <span class="text-sm font-bold text-red-600">命宮</span>
            </div>
          </div>
        </div>
      `;
      board.appendChild(palace);
    }

    // 渲染中宮
    const center = document.createElement('div');
    center.className = 'center-palace';
    center.innerHTML = `
      <div class="text-lg text-gray-500 mb-2 font-bold">等待輸入生辰排盤</div>
      <p class="text-sm text-gray-400">目前為空白盤面</p>
    `;
    board.appendChild(center);

    // 原始版自動縮放引擎
    window.simulateScale = function() {
      const contents = document.querySelectorAll('.palace-content');
      contents.forEach(content => {
        // 1. 強制歸零回 100% 測量真實尺寸
        content.style.transform = 'scale(1)';
        
        // 2. 測量與計算縮放
        setTimeout(() => {
          const parent = content.parentElement;
          const parentRect = parent.getBoundingClientRect();
          const contentHeight = content.scrollHeight;
          const contentWidth = content.scrollWidth;
          
          const heightRatio = parentRect.height / contentHeight;
          const widthRatio = parentRect.width / contentWidth;
          
          // 若有阻擋或超出，則進行等比例微幅縮放
          if (heightRatio < 1 || widthRatio < 1) {
            const scale = Math.min(heightRatio, widthRatio) * 0.95;
            content.style.transform = \`scale(\${scale})\`;
            content.style.transformOrigin = 'center center';
          }
        }, 10);
      });
    }
    
    // 初始載入時執行一次防擋檢測
    setTimeout(simulateScale, 100);
  </script>
</body>
</html>
