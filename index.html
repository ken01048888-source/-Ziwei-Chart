<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>紫微斗數排盤</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 防止手機瀏覽器長按反白或雙擊縮放，確保 App 般的操作體驗 */
    body { -webkit-user-select: none; user-select: none; overscroll-behavior: none; background-color: #f3f4f6; font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; }
    
    /* 12宮格極大化正方形 (4x4) */
    .grid-board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 1px;
      background-color: #9ca3af;
      border: 1px solid #9ca3af;
      aspect-ratio: 1 / 1;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
    }
    
    /* 單一宮位 */
    .palace {
      background-color: #ffffff;
      position: relative;
      overflow: hidden;
    }
    
    /* 中宮絕對置中 (佔據 2x2 空間) */
    .center-palace {
      grid-area: 2 / 2 / 4 / 4;
      background-color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      position: relative;
    }
  </style>
</head>
<body class="p-2 flex flex-col h-screen">

  <!-- 頂部控制列 -->
  <div class="flex justify-between items-center mb-2 max-w-[600px] mx-auto w-full">
    <h1 class="text-lg font-bold text-gray-800">紫微斗數</h1>
  </div>

  <!-- 命盤區 -->
  <div id="board" class="grid-board shadow-lg"></div>

  <!-- 底部控制區 (運限盤按鈕 - 保留原始排版與顏色設計) -->
  <div class="mt-4 grid grid-cols-4 gap-2 max-w-[600px] mx-auto w-full text-center">
    <button class="bg-purple-100 text-purple-800 py-2 rounded text-sm font-bold border border-purple-300">大限</button>
    <button class="bg-green-100 text-green-800 py-2 rounded text-sm font-bold border border-green-300">流年</button>
    <button class="bg-blue-100 text-blue-800 py-2 rounded text-sm font-bold border border-blue-300">流月</button>
    <button class="bg-orange-100 text-orange-800 py-2 rounded text-sm font-bold border border-orange-300">流日</button>
  </div>

  <script>
    const board = document.getElementById('board');
    // 定義 12 宮位在 4x4 網格中的座標 (從寅宮開始順時針)
    const gridAreas = [
      '4/1', '3/1', '2/1', '1/1', // 寅, 卯, 辰, 巳
      '1/2', '1/3', '1/4',        // 午, 未, 申
      '2/4', '3/4', '4/4',        // 酉, 戌, 亥
      '4/3', '4/2'                // 子, 丑
    ];

    // 渲染 12 宮位 (範例視覺展示)
    for(let i = 0; i < 12; i++) {
      const palace = document.createElement('div');
      palace.className = 'palace p-0.5 text-gray-800';
      palace.style.gridArea = gridAreas[i];
      
      palace.innerHTML = `
        <!-- 左上：宮干 (無框線，維持清晰大小) -->
        <div class="absolute top-1 left-1 text-[10px] text-gray-500 font-medium">甲子</div>
        
        <!-- 右上：運線祿羊陀鸞喜 (水平排列，不換行) -->
        <div class="absolute top-1 right-1 flex gap-[2px] items-start">
          <div class="text-[8px] text-red-600 font-bold shrink-0">祿</div>
          <div class="text-[8px] text-gray-500 shrink-0">羊</div>
        </div>

        <!-- 中左：主輔星與四化 (絕對靠左對齊，四化含框寬度貼齊星曜) -->
        <div class="absolute top-5 left-1 flex flex-col items-start gap-[2px]">
          <div class="flex items-center gap-[1px]">
            <span class="text-[12px] font-bold text-red-700">紫微</span>
            <span class="text-[8px] bg-blue-600 text-white px-[1px] rounded w-full text-center">權</span>
          </div>
          <div class="flex items-center gap-[1px]">
            <span class="text-[11px] text-gray-700">文昌</span>
            <span class="text-[8px] bg-gray-500 text-white px-[1px] rounded w-full text-center">忌</span>
          </div>
        </div>

        <!-- 右下：疊宮與本命宮 (垂直堆疊，保留色彩框線) -->
        <div class="absolute bottom-1 right-1 flex flex-col items-end gap-[1px]">
          <span class="text-[10px] text-purple-700 border border-purple-300 px-[2px] rounded leading-tight shrink-0">大限命宮</span>
          <span class="text-[10px] text-green-700 border border-green-300 px-[2px] rounded leading-tight shrink-0">流年夫妻</span>
          <span class="text-[10px] font-bold text-red-600 leading-tight mt-[1px] shrink-0">命宮</span>
        </div>

        <!-- 左下：歲數 -->
        <div class="absolute bottom-1 left-1 text-[9px] text-gray-400">
          4-13
        </div>
      `;
      board.appendChild(palace);
    }

    // 渲染中宮 (預設為空白等待排盤)
    const center = document.createElement('div');
    center.className = 'center-palace';
    center.innerHTML = `
      <div class="text-sm text-gray-400 mb-2">請輸入生辰排盤</div>
    `;
    board.appendChild(center);
  </script>
</body>
</html>
